{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>{{ app_name }}</h1>
        </div>

        {% if error %}
        <div class="login-error">
            {{ error }}
        </div>
        {% endif %}

        <form id="login-form" method="POST" action="/api/auth/login">
            <div class="form-group">
                <input
                    type="password"
                    id="name"
                    name="name"
                    class="form-input"
                    placeholder="Password"
                    required
                    autocomplete="current-password"
                    autofocus
                >
            </div>

            <div class="form-group form-checkbox">
                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        id="remember"
                        name="remember"
                        value="1"
                        class="form-checkbox-input"
                    >
                    <span class="checkbox-text">Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Sign In
            </button>
        </form>
    </div>
</div>

<script>
// Pure JS SHA-256 implementation for non-secure contexts
function sha256_fallback(ascii) {
    function rightRotate(value, amount) {
        return (value >>> amount) | (value << (32 - amount));
    }
    var mathPow = Math.pow;
    var maxWord = mathPow(2, 32);
    var lengthProperty = 'length';
    var i, j; 
    var result = '';
    var words = [];
    var asciiBitLength = ascii[lengthProperty] * 8;
    var hash = sha256_fallback.h = sha256_fallback.h || [];
    var k = sha256_fallback.k = sha256_fallback.k || [];
    var primeCounter = k[lengthProperty];
    var isComposite = {};
    for (var candidate = 2; primeCounter < 64; candidate++) {
        if (!isComposite[candidate]) {
            for (i = 0; i < 313; i += candidate) {
                isComposite[i] = candidate;
            }
            hash[primeCounter] = (mathPow(candidate, .5) * maxWord) | 0;
            k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
        }
    }
    ascii += '\x80';
    while (ascii[lengthProperty] % 64 - 56) ascii += '\x00';
    for (i = 0; i < ascii[lengthProperty]; i++) {
        j = ascii.charCodeAt(i);
        if (j >> 8) return; 
        words[i >> 2] |= j << ((3 - i) % 4) * 8;
    }
    words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
    words[words[lengthProperty]] = (asciiBitLength | 0);
    for (j = 0; j < words[lengthProperty]; j += 16) {
        var w = words.slice(j, j + 16);
        var oldHash = hash;
        hash = hash.slice(0, 8);
        for (i = 0; i < 64; i++) {
            var i2 = i + j;
            var w15 = w[i - 15], w2 = w[i - 2];
            var a = hash[0], e = hash[4];
            var temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5]) ^ (~e & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
            var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
            hash = [(temp1 + temp2) | 0].concat(hash);
            hash[4] = (hash[4] + temp1) | 0;
        }
        for (i = 0; i < 8; i++) {
            hash[i] = (hash[i] + oldHash[i]) | 0;
        }
    }
    for (i = 0; i < 8; i++) {
        for (j = 3; j + 1; j--) {
            var b = (hash[i] >> (j * 8)) & 255;
            result += ((b < 16) ? 0 : '') + b.toString(16);
        }
    }
    return result;
}

async function hashValue(value) {
    if (window.crypto && crypto.subtle && window.TextEncoder) {
        const msgUint8 = new TextEncoder().encode(value);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    } else {
        // Fallback for non-secure contexts
        return sha256_fallback(value);
    }
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);
    const rawPassword = formData.get('name');
    const hashedName = await hashValue(rawPassword);

    const data = {
        name: hashedName,
        remember_me: formData.get('remember') === '1'
    };

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data),
            credentials: 'include'
        });

        if (response.ok) {
            window.location.href = '/light/';
        } else {
            const error = await response.json();
            const errorDiv = document.querySelector('.login-error');
            if (errorDiv) {
                errorDiv.textContent = error.detail || 'Invalid credentials';
                errorDiv.style.display = 'block';
            } else {
                const newError = document.createElement('div');
                newError.className = 'login-error';
                newError.textContent = error.detail || 'Invalid credentials';
                form.insertBefore(newError, form.firstChild);
            }
        }
    } catch (error) {
        console.error('Login error:', error);
        alert('An error occurred. Please try again.');
    }
});
</script>
{% endblock %}
