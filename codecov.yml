# Coverage only measures the Go API. Patch target is a realistic floor for a
# repo with no prior coverage gate (project sits ~54%); raise it over time.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 40%
        threshold: 2%

# cmd/seed is a standalone stress-test data generator, not shipped app code —
# it has its own main() and writes raw batched INSERTs. Not worth unit tests.
ignore:
  - "api/cmd/seed"
