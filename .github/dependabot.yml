version: 2
updates:
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: "develop"
    
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: "develop"
    
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: "develop"
    
  - package-ecosystem: docker
    directory: /build
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: "develop"
