<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="" />
  <title>Loading…</title>

  <!-- CSS — public and admin bundles both preloaded; the active one is set via
       media="all" and the inactive one via media="not all". The section is
       switched synchronously by app.js before any page component mounts. -->
  <link id="css-public" rel="stylesheet" href="/assets/css/main.css?v=__BUILD_VERSION__" />
  <link id="css-light"  rel="stylesheet" href="/assets/css/light.css?v=__BUILD_VERSION__" media="not all" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
  <link rel="icon" type="image/png" sizes="128x128" href="/assets/images/favicon-128.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/images/favicon-512.png" />
  <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed.xml" />
</head>
<body>

  <!-- SPA mount point — all content rendered here by JavaScript -->
  <div id="app" role="main"></div>

  <!-- Toast container — rendered by ToastContainer component -->
  <div id="toasts" aria-live="polite" aria-atomic="true"></div>

  <!-- App bootstrap — type=module enables ES module imports -->
  <script type="module" src="/assets/js/app.js?v=__BUILD_VERSION__"></script>

</body>
</html>
