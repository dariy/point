<!-- Client-side Templates for AJAX Navigation -->
<template id="tmpl-header-default">
    <div class="header-left-group">
        <nav class="site-breadcrumb">
            <a href="#" class="logo theme-toggle">
                {% include "shared/logo.html" %}
            </a>
            <a href="/" class="site-title{% if user %} authenticated{% endif %}">
                <span>{{ blog_title }}</span>
            </a>
            {% if blog_subtitle %}
            <p class="site-subtitle">{{ blog_subtitle }}</p>
            {% endif %}
        </nav>
    </div>
</template>

<template id="tmpl-header-immersive">
    <div class="post-header-bar">
        <div class="header-left">
            <a href="/" class="nav-link" title="Back to Home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
        </div>
        <div class="header-center">
            <h1 class="site-title breadcrumbs centered">
                <a href="/" class="breadcrumb-link">{{ blog_title }}</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current title-text"></span>
            </h1>
            <div class="post-meta">
                <time class="post-date"></time>
                <span class="post-meta-divider">·</span>
                <span class="post-views"></span>
            </div>
        </div>
        <div class="header-right">
            <nav class="site-nav">
                <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </nav>
        </div>
    </div>
</template>

<template id="tmpl-post-standard">
    <article class="post-single">
        <header class="post-header">
            <div class="post-meta">
                <time class="post-date"></time>
                <span class="post-meta-divider">·</span>
                <span class="post-views"></span>
            </div>
            <h1 class="post-title breadcrumbs centered">
                <a href="/" class="breadcrumb-link">{{ blog_title }}</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current"></span>
            </h1>
        </header>

        <div class="post-content">
            <!-- Content injected here -->
        </div>

        <footer class="post-footer">
            <div class="post-tags"></div>
            <div class="post-navigation">
                <!-- Nav injected here -->
            </div>
        </footer>
    </article>
</template>

<template id="tmpl-post-immersive">
    <div class="immersive-wrapper">
        <div class="immersive-visuals">
            <div class="carousel-container">
                <!-- Slides injected here -->
                <button class="carousel-prev" aria-label="Previous media">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button class="carousel-next" aria-label="Next media">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <div class="carousel-indicators">
                    <!-- Dots injected here -->
                </div>
            </div>
        </div>
    </div>
</template>

<template id="tmpl-post-card">
    <article class="post-card">
        <div class="post-card-edit-wrapper"></div>
        <div class="post-card-visual-wrapper"></div>
        <div class="post-card-content">
            <div class="post-card-meta">
                <span class="featured-badge hidden">
                    <svg width="16" height="16" viewBox="0 -2 24 22" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </span>
                <time class="post-date"></time>
                <span class="view-count-wrapper"></span>
            </div>
            <h2 class="post-card-title"><a></a></h2>
            <div class="post-card-preview-wrapper"></div>
            <div class="post-card-tags"></div>
        </div>
    </article>
</template>
