services:
  point:
    image: ${IMAGE:-ghcr.io/dariy/point:latest}
    container_name: ${NAME:-point}
    restart: unless-stopped
    # host networking avoids Netavark (required for rootless Podman on WSL2 / cgroups v1).
    # With host mode the app is accessible directly on PORT (default 8000).
    # Docker users who want port remapping: remove network_mode and uncomment ports below.
    # network_mode: host
    ports:
      - "${APP_PORT:-8000}:${PORT:-8000}"
    env_file:
      - path: .env
        required: false
    environment:
      - APP_NAME=${APP_NAME:-Point}
      - APP_URL=${APP_URL:-}
      - DATABASE_URL=/data/point.db
      - STORAGE_PATH=/data
      - FRONTEND_DIR=/app/frontend
      - HOST=0.0.0.0
      # Comments via the bundled remark42 engine (optional) — set both in .env
      # to start it, then enable the "Comments" plugin in Admin → Plugins.
      - REMARK_URL=${REMARK_URL:-}
      - REMARK_SECRET=${REMARK_SECRET:-}
      - AUTH_ANON=${AUTH_ANON:-true}
      # - PHOTO_LIBRARY_PATH=/photos
    volumes:
      - ${DATA_PATH:-./data}:/data:z,U
      # Uncomment the next line and set PHOTO_LIBRARY_PATH in .env to mount your library
      # - ${PHOTO_LIBRARY_PATH:-./import}:/photos:ro,z
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
