name: Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - name: golangci-lint
        uses: golangci-lint/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api
          args: --timeout=5m

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - name: Build CSS bundles
        run: chmod +x build/build_css.sh && ./build/build_css.sh

      - name: Run tests
        run: |
          cd api
          go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: api/coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unittests
          name: codecov-go
