name: Tag release

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Calculate next version and create tag
        run: |
          # Fetch all tags to find the latest
          git fetch --tags --force
          
          # Get the latest tag. If no tags exist, start with v0.1.0
          # We use --tags to include all tags and --abbrev=0 to get just the name
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # If the current commit already has a version tag, we skip
          if git tag --points-at HEAD | grep -q "^v[0-9]"; then
            echo "Current commit already has a version tag, skipping."
            exit 0
          fi
          
          # Extract version numbers, stripping 'v' prefix
          VERSION_NUM=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"
          
          # Fallback if parsing fails
          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            MAJOR=0
            MINOR=1
            PATCH=0
          fi
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New tag will be: $NEW_TAG"
          
          # Final safety check: ensure the tag doesn't exist on remote
          if git ls-remote --tags origin "$NEW_TAG" | grep -q "$NEW_TAG"; then
             echo "Tag $NEW_TAG already exists on remote, skipping."
             exit 0
          fi
          
          # Create and push the tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
