{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>{{ app_name }}</h1>
            <p>Sign in to your account</p>
        </div>

        {% if error %}
        <div class="login-error">
            {{ error }}
        </div>
        {% endif %}

        <form id="login-form" method="POST" action="/api/auth/login">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    required
                    autocomplete="username"
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="form-group form-checkbox">
                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        id="remember"
                        name="remember"
                        value="1"
                        class="form-checkbox-input"
                    >
                    <span class="checkbox-text">Remember me on this device</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Sign In
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);
    const data = {
        username: formData.get('username'),
        password: formData.get('password'),
        remember_me: formData.get('remember') === '1'
    };

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data),
            credentials: 'include'
        });

        if (response.ok) {
            window.location.href = '/admin/';
        } else {
            const error = await response.json();
            const errorDiv = document.querySelector('.login-error');
            if (errorDiv) {
                errorDiv.textContent = error.detail || 'Invalid credentials';
                errorDiv.style.display = 'block';
            } else {
                const newError = document.createElement('div');
                newError.className = 'login-error';
                newError.textContent = error.detail || 'Invalid credentials';
                form.insertBefore(newError, form.firstChild);
            }
        }
    } catch (error) {
        console.error('Login error:', error);
        alert('An error occurred. Please try again.');
    }
});
</script>
{% endblock %}
