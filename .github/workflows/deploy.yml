name: Build and Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'api/**'
              - 'frontend/**'
            infra:
              - 'build/**'
              - '.github/workflows/deploy.yml'

  test:
    needs: check-changes
    if: needs.check-changes.outputs.run_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - name: Build CSS bundles
        run: chmod +x scripts/build-css.sh && ./scripts/build-css.sh

      - name: Run tests
        run: |
          cd api
          go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: api/coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    needs: [check-changes, test]
    if: |
      needs.check-changes.result == 'success' &&
      !failure() &&
      !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_sha_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate build version
        id: version
        run: |
          # Use git tag if available, otherwise use version from package.json + short SHA + timestamp
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            BASE_VERSION=$(grep '"version":' package.json | head -n 1 | cut -d'"' -f4)
            SHA_SHORT="${GITHUB_SHA:0:7}"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-${SHA_SHORT}-${TIMESTAMP}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Prepare remote directories
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ${{ secrets.DEPLOY_PATH || '/opt/point' }}/build ${{ secrets.DEPLOY_PATH || '/opt/point' }}/data"

      - name: Copy docker-compose files to server
        run: |
          scp -o StrictHostKeyChecking=no -P ${{ secrets.DEPLOY_SSH_PORT || 22 }} build/docker-compose.prod.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH || '/opt/point' }}/build/

      - name: Deploy to Production
        env:
          BUILD_VERSION: ${{ needs.build.outputs.version }}
          IMAGE_TAG: ${{ github.sha }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -s" << 'EOF'
            export BUILD_VERSION="${{ env.BUILD_VERSION }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            export SECRET_KEY="${{ env.SECRET_KEY }}"
            export SESSION_SECRET="${{ env.SESSION_SECRET }}"
            export GEMINI_API_KEY="${{ env.GEMINI_API_KEY }}"
            export DEPLOY_PORT="${{ env.DEPLOY_PORT }}"
            export GHCR_TOKEN="${{ env.GHCR_TOKEN }}"

            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/opt/point' }}

            # Set version and image tag in .env file (now in build/ directory)
            if [ -f build/.env ]; then
              sed -i '/^APP_VERSION=/d' build/.env
              sed -i '/^IMAGE_TAG=/d' build/.env
              sed -i '/^DEPLOY_PORT=/d' build/.env
              echo "APP_VERSION=${BUILD_VERSION}" >> build/.env
              echo "IMAGE_TAG=${IMAGE_TAG:0:7}" >> build/.env
              [ -n "${DEPLOY_PORT}" ] && echo "DEPLOY_PORT=${DEPLOY_PORT}" >> build/.env
            else
              echo "APP_VERSION=${BUILD_VERSION}" > build/.env
              echo "IMAGE_TAG=${IMAGE_TAG:0:7}" >> build/.env
              [ -n "${DEPLOY_PORT}" ] && echo "DEPLOY_PORT=${DEPLOY_PORT}" >> build/.env
            fi

            # Add / update sensitive secrets in build/.env (do NOT print them)
            sed -i '/^SECRET_KEY=/d' build/.env || true
            sed -i '/^SESSION_SECRET=/d' build/.env || true
            sed -i '/^GEMINI_API_KEY=/d' build/.env || true
            printf '%s\n' "SECRET_KEY=${SECRET_KEY}" >> build/.env
            printf '%s\n' "SESSION_SECRET=${SESSION_SECRET}" >> build/.env
            printf '%s\n' "GEMINI_API_KEY=${GEMINI_API_KEY}" >> build/.env

            chmod 600 build/.env

            # Login to GitHub Container Registry
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ secrets.GHCR_USER != '' && secrets.GHCR_USER || github.repository_owner }} --password-stdin

            # Clean up Docker resources to free disk space
            echo "Cleaning up Docker resources..."
            docker image prune -af --filter "until=168h" || true
            docker container prune -f || true
            docker builder prune -af || true

            # Show disk space before pull
            echo "Disk space before pull:"
            df -h / | tail -1

            # Pull specific Docker image by SHA tag (first 7 chars of commit SHA)
            echo "Pulling image with tag: ${IMAGE_TAG:0:7}"
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG:0:7}
            docker tag ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG:0:7} ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Export truncated IMAGE_TAG to environment
            export IMAGE_TAG=${IMAGE_TAG:0:7}
            echo "Using IMAGE_TAG=${IMAGE_TAG} for docker-compose"

            # Deploy new version from build directory
            cd build

            docker compose -f docker-compose.prod.yml up -d point

            # Verify correct image is running
            echo "Verifying deployed image..."
            DEPLOYED_IMAGE=$(docker inspect point-prod --format='{{.Config.Image}}' 2>/dev/null || docker inspect point --format='{{.Config.Image}}')
            echo "Deployed image: ${DEPLOYED_IMAGE}"
            echo "Expected tag: ${IMAGE_TAG:0:7}"

            if [[ ! "${DEPLOYED_IMAGE}" =~ ${IMAGE_TAG:0:7} ]]; then
              echo "ERROR: Deployed image tag does not match expected tag!"
              echo "Expected: ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG:0:7}"
              echo "Got: ${DEPLOYED_IMAGE}"
              exit 1
            fi

            # Wait for container to start
            echo "Waiting for container to start..."
            sleep 5

            # Server-side health check
            echo "Running server-side health check..."
            max_attempts=12
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if docker exec point-prod wget -qO- http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              attempt=$((attempt + 1))
              echo "Attempt $attempt/$max_attempts - waiting..."
              sleep 5
            done

            # If health check fails, show logs for debugging
            echo "Health check failed! Container logs:"
            docker logs --tail=100 point-prod
            echo "Container status:"
            docker inspect point-prod --format='{{.State.Status}} (ExitCode: {{.State.ExitCode}})'
            exit 1
          EOF

      - name: External Health Check
        continue-on-error: true
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          echo "Verifying external access..."
          PORT_SUFFIX=""
          if [ -n "$DEPLOY_PORT" ] && [ "$DEPLOY_PORT" != "80" ] && [ "$DEPLOY_PORT" != "443" ]; then
            PORT_SUFFIX=":$DEPLOY_PORT"
          fi

          if curl -f -s -m 10 "https://${{ secrets.DEPLOY_HOST }}$PORT_SUFFIX/health" > /dev/null 2>&1; then
            echo "HTTPS health check passed!"
          elif curl -f -s -m 10 "http://${{ secrets.DEPLOY_HOST }}$PORT_SUFFIX/health" > /dev/null 2>&1; then
            echo "HTTP health check passed!"
          else
            echo "Warning: External health check failed (server may not have public access configured on port ${DEPLOY_PORT:-80/443})"
          fi

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🚀 Application is live at https://${{ secrets.DEPLOY_HOST }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs and consider rolling back."

      - name: Create deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
