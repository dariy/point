services:
  point:
    image: ghcr.io/dariy/point:latest
    container_name: ${NAME:-point}
    restart: unless-stopped
    # host networking avoids Netavark (required for rootless Podman on WSL2 / cgroups v1).
    # With host mode the app is accessible directly on PORT (default 8000).
    # Docker users who want port remapping: remove network_mode and uncomment ports below.
    network_mode: host
    # ports:
    #   - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=/data/point.db
      - STORAGE_PATH=/data
      - FRONTEND_DIR=/app/frontend
      - HOST=0.0.0.0
    volumes:
      - point-data:/data
      - ${PHOTO_LIBRARY_PATH:-/data/import}:/photos:ro # set PHOTO_LIBRARY_PATH in .env to mount your library
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
volumes:
  point-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}
