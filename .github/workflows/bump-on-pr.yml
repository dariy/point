name: Bump version for release

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # RELEASE_PAT must be a classic PAT (repo scope) from a repo admin.
          # Admin accounts can bypass the develop branch ruleset.
          # Without this secret the push will be rejected by branch protection.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(grep '"version":' package.json | head -n1 | cut -d'"' -f4)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW}\"/" package.json
          echo "version=${NEW}" >> $GITHUB_OUTPUT

      - name: Commit bump to develop
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push
