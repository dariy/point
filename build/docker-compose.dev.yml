services:
  point:
    build:
      context: ..
      dockerfile: build/dev.Dockerfile
    image: point:dev
    container_name: point
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - point-data:/data
    env_file:
      - .env
    environment:
      - TZ=UTC
      - DATABASE_URL=sqlite+aiosqlite:////data/point.db
      - STORAGE_PATH=/data
    command: sh -c "python scripts/init_db.py --create-admin && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  point-data:
    driver: local

networks:
  default:
    name: point-network
    external: true
