name: Build and Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run linting
        run: |
          ruff check app/

      - name: Run type checking
        run: |
          mypy app/

      - name: Run tests
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate build version
        id: version
        run: |
          # Use git tag if available, otherwise use short SHA with timestamp
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:7}-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || 22 }}
          source: "docker-compose*.yml"
          target: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/opt/photo-blog' }}
          overwrite: true
          strip_components: 0

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || 22 }}
          envs: BUILD_VERSION
          script: |
            cd ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/opt/photo-blog' }}

            # Pull latest code (optional - if using git deployment)
            if [ -d .git ]; then
              git pull origin main
            fi

            # Set version in .env file
            if [ -f .env ]; then
              sed -i '/^APP_VERSION=/d' .env
              echo "APP_VERSION=${BUILD_VERSION}" >> .env
            else
              echo "APP_VERSION=${BUILD_VERSION}" > .env
            fi

            # Login to GitHub Container Registry (requires GHCR_TOKEN secret with read:packages scope)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER != '' && secrets.GHCR_USER || github.repository_owner }} --password-stdin

            # Pull latest Docker image explicitly by name
            docker pull ghcr.io/dariy/point:latest

            # Update docker-compose.yml to use correct image (in case it's outdated)
            sed -i 's|image:.*photo-blog.*|image: ghcr.io/dariy/point:latest|g' docker-compose.yml 2>/dev/null || true
            sed -i 's|image:.*photo-blog.*|image: ghcr.io/dariy/point:latest|g' docker-compose.prod.yml 2>/dev/null || true

            # Backup database before deployment
            docker compose exec -T blog python -c "
            from app.services.backup_service import BackupService
            service = BackupService()
            backup_path = service.create_backup()
            print(f'Backup created: {backup_path}')
            " || echo "Backup failed, continuing deployment..."

            # Deploy new version
            docker compose up -d blog

            # Wait for container to start
            echo "Waiting for container to start..."
            sleep 5

            # Server-side health check
            echo "Running server-side health check..."
            max_attempts=12
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if docker compose exec -T blog curl -f -s http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              attempt=$((attempt + 1))
              echo "Attempt $attempt/$max_attempts - waiting..."
              sleep 5
            done

            # If health check fails, show logs for debugging
            echo "Health check failed! Container logs:"
            docker compose logs --tail=50 blog
            exit 1

      - name: External Health Check
        continue-on-error: true
        run: |
          echo "Verifying external access..."
          if curl -f -s -m 10 https://${{ secrets.DEPLOY_HOST }}/health > /dev/null 2>&1; then
            echo "HTTPS health check passed!"
          elif curl -f -s -m 10 http://${{ secrets.DEPLOY_HOST }}/health > /dev/null 2>&1; then
            echo "HTTP health check passed!"
          else
            echo "Warning: External health check failed (server may not have public access configured)"
          fi

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🚀 Application is live at https://${{ secrets.DEPLOY_HOST }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs and consider rolling back."

      - name: Create deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
