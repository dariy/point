{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/light.css">
{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>
                <svg class="app-logo" viewBox="0 0 128 128" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <g class="logo-shape">
                        <circle cx="64" cy="64" r="64" />
                        <circle cx="112" cy="112" r="16" />
                        <rect width="48" height="48" x="80" y="64" />
                        <rect width="48" height="48" x="64" y="80" />
                    </g>
                </svg>
                <span>{{ app_name }}</span>
            </h1>
        </div>

        {% if error %}
        <div class="login-error">
            {{ error }}
        </div>
        {% endif %}

        <form id="login-form" method="POST" action="/api/auth/login">
            <div class="form-group">
                <input type="password" id="name" name="name" class="form-input" placeholder="Password" required
                    autocomplete="current-password" autofocus>
            </div>

            <div class="form-group form-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember" name="remember" value="1" class="form-checkbox-input">
                    <span class="checkbox-text">Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Sign In
            </button>
        </form>
    </div>
</div>

<script src="/static/js/auth.js"></script>
{% endblock %}
