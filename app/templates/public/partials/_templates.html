<!-- Client-side Templates for AJAX Navigation -->
<template id="tmpl-header-default">
    <div class="header-left-group">
        <a href="/light" class="light-link" title="Go to light panel" aria-label="light panel" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
            </svg>
        </a>
        <nav class="site-breadcrumb">
            <a href="/" class="logo theme-toggle">
                {% include "shared/logo.html" %}
            </a>
            <a href="/" class="site-title{% if user %} authenticated{% endif %}">
                <span>{{ blog_title }}</span>
            </a>
            {% if blog_subtitle %}
            <p class="site-subtitle">{{ blog_subtitle }}</p>
            {% endif %}
        </nav>
    </div>
    <nav class="site-nav">
        <a href="#" class="create-post edit-tag-btn" title="Edit Tag" aria-label="Edit Tag" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </a>
        <a href="/map" class="header-action-btn ajax-link" title="Map" aria-label="Map">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        </a>
        <a href="/light/posts/new" class="create-post" title="Create new post" aria-label="Create new post"
            style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
        </a>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </nav>
</template>

<template id="tmpl-header-immersive">
    <div class="post-header-bar">
        <div class="header-left">
            <a href="/" class="nav-link" title="Back to Home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
            <a href="/light" class="light-link" title="Go to light panel" aria-label="light panel"
                style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
            </a>
        </div>
        <div class="header-center">
            <h1 class="site-title breadcrumbs centered">
                <a href="/" class="breadcrumb-link">{{ blog_title }}</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current title-text"></span>
            </h1>
            <div class="post-meta">
                <time class="post-date"></time>
                <span class="post-meta-divider">·</span>
                <span class="post-views"></span>
            </div>
        </div>
        <div class="header-right">
            <a href="/light/posts/new" class="create-post" title="Create new post" aria-label="Create new post"
                style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"></path>
                </svg>
            </a>
            <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </div>
</template>

<template id="tmpl-post-standard">
    <article class="post-single">
        <header class="post-header">
            <div class="post-meta">
                <time class="post-date"></time>
                <span class="post-meta-divider">·</span>
                <span class="post-views"></span>
            </div>
            <h1 class="post-title breadcrumbs centered">
                <a href="/" class="breadcrumb-link">{{ blog_title }}</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current"></span>
            </h1>
        </header>

        <div class="post-content">
            <!-- Content injected here -->
        </div>

        <footer class="post-footer">
            <div class="post-tags"></div>
            <div class="post-navigation">
                <!-- Nav injected here -->
            </div>
        </footer>
    </article>
</template>

<template id="tmpl-post-immersive">
    <div class="immersive-wrapper">
        <div class="immersive-visuals">
            <div class="carousel-container">
                <!-- Slides injected here -->
                <button class="carousel-prev" aria-label="Previous media">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button class="carousel-next" aria-label="Next media">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <div class="carousel-indicators">
                    <!-- Dots injected here -->
                </div>
            </div>
        </div>
    </div>
</template>

<template id="tmpl-post-card">
    <article class="post-card">
        <div class="post-card-edit-wrapper"></div>
        <div class="post-card-visual-wrapper"></div>
        <div class="post-card-content">
            <div class="post-card-meta">
                <span class="featured-badge hidden">
                    <svg width="16" height="16" viewBox="0 -2 24 22" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </span>
                <time class="post-date"></time>
                <span class="view-count-wrapper"></span>
            </div>
            <h2 class="post-card-title"><a></a></h2>
            <div class="post-card-preview-wrapper"></div>
            <div class="post-card-tags"></div>
        </div>
    </article>
</template>
