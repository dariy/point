{% extends "light/base.html" %}

{% block page_title %}Security Settings{% endblock %}

{% block content %}
<div class="settings-container">
    <form id="password-form" class="light-form">
        <div class="form-section">
            <h3 class="section-title">Change Password</h3>
            <p style="margin-bottom: 20px; color: var(--light-text-secondary); font-size: 0.9em;">Update your account password. You will need to provide your current password for verification.</p>
            
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_name" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_name" required minlength="8">
                    <p class="form-help">Min. 8 characters</p>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_name" required minlength="8">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <span id="password-status" class="save-status"></span>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Pure JS SHA-256 implementation for non-secure contexts
function sha256_fallback(ascii) {
    function rightRotate(value, amount) {
        return (value >>> amount) | (value << (32 - amount));
    }
    var mathPow = Math.pow;
    var maxWord = mathPow(2, 32);
    var lengthProperty = 'length';
    var i, j; 
    var result = '';
    var words = [];
    var asciiBitLength = ascii[lengthProperty] * 8;
    var hash = sha256_fallback.h = sha256_fallback.h || [];
    var k = sha256_fallback.k = sha256_fallback.k || [];
    var primeCounter = k[lengthProperty];
    var isComposite = {};
    for (var candidate = 2; primeCounter < 64; candidate++) {
        if (!isComposite[candidate]) {
            for (i = 0; i < 313; i += candidate) {
                isComposite[i] = candidate;
            }
            hash[primeCounter] = (mathPow(candidate, .5) * maxWord) | 0;
            k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
        }
    }
    ascii += '\x80';
    while (ascii[lengthProperty] % 64 - 56) ascii += '\x00';
    for (i = 0; i < ascii[lengthProperty]; i++) {
        j = ascii.charCodeAt(i);
        if (j >> 8) return; 
        words[i >> 2] |= j << ((3 - i) % 4) * 8;
    }
    words[words[lengthProperty]] = ((asciiBitLength / maxWord) | 0);
    words[words[lengthProperty]] = (asciiBitLength | 0);
    for (j = 0; j < words[lengthProperty]; j += 16) {
        var w = words.slice(j, j + 16);
        var oldHash = hash;
        hash = hash.slice(0, 8);
        for (i = 0; i < 64; i++) {
            var i2 = i + j;
            var w15 = w[i - 15], w2 = w[i - 2];
            var a = hash[0], e = hash[4];
            var temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5]) ^ (~e & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
            var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
            hash = [(temp1 + temp2) | 0].concat(hash);
            hash[4] = (hash[4] + temp1) | 0;
        }
        for (i = 0; i < 8; i++) {
            hash[i] = (hash[i] + oldHash[i]) | 0;
        }
    }
    for (i = 0; i < 8; i++) {
        for (j = 3; j + 1; j--) {
            var b = (hash[i] >> (j * 8)) & 255;
            result += ((b < 16) ? 0 : '') + b.toString(16);
        }
    }
    return result;
}

async function hashValue(value) {
    if (window.crypto && crypto.subtle && window.TextEncoder) {
        const msgUint8 = new TextEncoder().encode(value);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    } else {
        // Fallback for non-secure contexts
        return sha256_fallback(value);
    }
}

// Password Change Form
document.getElementById('password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const saveBtn = form.querySelector('button[type="submit"]');
    const status = document.getElementById('password-status');
    
    if (saveBtn.disabled) return;

    const currentPassword = form.current_name.value;
    const newPassword = form.new_name.value;
    const confirmPassword = form.confirm_name.value;

    if (newPassword !== confirmPassword) {
        status.textContent = 'Error: New passwords do not match';
        status.className = 'save-status error';
        return;
    }

    saveBtn.disabled = true;
    status.textContent = 'Updating...';
    status.className = 'save-status';

    try {
        const hashedCurrent = await hashValue(currentPassword);
        const hashedNew = await hashValue(newPassword);

        const response = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                current_name: hashedCurrent,
                new_name: hashedNew
            }),
        });

        if (response.ok) {
            status.textContent = 'Password updated successfully!';
            status.className = 'save-status success';
            form.reset();
            if (window.LightUtils && window.LightUtils.showToast) {
                window.LightUtils.showToast('Password updated successfully!');
            }
            setTimeout(() => {
                if (status.textContent === 'Password updated successfully!') {
                    status.textContent = '';
                }
            }, 3000);
        } else {
            const data = await response.json();
            const errorMsg = data.detail || 'Failed to update password';
            status.textContent = 'Error: ' + errorMsg;
            status.className = 'save-status error';
            if (window.LightUtils && window.LightUtils.showToast) {
                window.LightUtils.showToast(errorMsg, 'error');
            }
        }
    } catch (error) {
        console.error('Password change error caught:', error);
        status.textContent = 'Error: ' + error.message;
        status.className = 'save-status error';
    } finally {
        saveBtn.disabled = false;
    }
});
</script>
<style>
.settings-container {
    max-width: 800px;
    margin: 0 auto;
}
.form-section {
    background: var(--light-card-bg);
    border: 1px solid var(--light-border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
}
.section-title {
    margin-top: 0;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--light-border);
    color: var(--light-text-primary);
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--light-text-primary);
}
.form-group input[type="password"] {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--light-border);
    border-radius: 4px;
    background: var(--light-input-bg);
    color: var(--light-text-primary);
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.form-help {
    margin: 5px 0 0;
    font-size: 0.85em;
    color: var(--light-text-secondary);
}
.form-actions {
    display: flex;
    align-items: center;
    gap: 20px;
}
.save-status {
    font-weight: 500;
}
.save-status.success {
    color: #10b981;
}
.save-status.error {
    color: #ef4444;
}
</style>
{% endblock %}
