{% extends "public/base.html" %}

{% block page_title %}Gallery{% endblock %}

{% block extra_css %}
{{ super() }}
<meta property="og:title" content="Photo Gallery">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta name="description" content="Browse our photo gallery">
{% endblock %}

{% block content %}
<div class="gallery-page">
    <!--header class="page-header">
        <h1 class="page-title">Gallery</h1>
        <p class="page-description">Browse all photos</p>
    </header-->

    {% if tags %}
    <div class="gallery-filters" id="gallery-filters">
        <a href="/gallery" class="filter-btn ajax-link {% if not current_tag %}active{% endif %}">All</a>
        {% for tag in tags %}
        <a href="/gallery?tag={{ tag.slug }}" class="filter-btn ajax-link {% if current_tag == tag.slug %}active{% endif %}">
            {{ tag.name }}
        </a>
        {% endfor %}
    </div>
    {% endif %}

    <div id="gallery-content">
        {% include "public/partials/gallery_grid.html" %}
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const galleryContent = document.getElementById('gallery-content');
    const filtersContainer = document.getElementById('gallery-filters');

    // Function to handle AJAX navigation
    async function loadGalleryContent(url) {
        try {
            galleryContent.style.opacity = '0.5';
            
            const response = await fetch(url, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (response.ok) {
                const data = await response.json();
                renderGallery(data);
                
                window.history.pushState({}, '', url);
                updateActiveFilter(url);
                attachListeners();
            } else {
                window.location.href = url;
            }
        } catch (error) {
            console.error('Error loading gallery:', error);
            window.location.href = url;
        } finally {
            galleryContent.style.opacity = '1';
        }
    }

    function renderGallery(data) {
        if (!data.posts || data.posts.length === 0) {
            galleryContent.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                            <path d="M8.5 10a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <h2 class="empty-state-title">No photos yet</h2>
                    <p class="empty-state-text">Try selecting a different category or check back later.</p>
                </div>`;
            return;
        }

        let html = '<div class="gallery-grid">';
        data.posts.forEach(post => {
            const imageHtml = post.thumbnail_path 
                ? `<img src="${post.thumbnail_path}" alt="${post.title}" loading="lazy">`
                : `<div class="no-image-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                        <path d="M8.5 10a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                   </div>`;

            html += `
                <article class="gallery-item" onclick="if(!event.target.closest('a')){ window.location.href='/posts/${post.slug}'; }">
                    <div class="gallery-item-image">
                        ${imageHtml}
                        <div class="gallery-item-overlay">
                            <h3 class="gallery-item-title">${post.title}</h3>
                            <time class="gallery-item-date">${post.published_date}</time>
                        </div>
                    </div>
                </article>`;
        });
        html += '</div>';

        if (data.pagination && data.pagination.total_pages > 1) {
            const pag = data.pagination;
            const tagParam = data.current_tag ? `&tag=${data.current_tag}` : '';
            
            html += '<nav class="pagination gallery-pagination" aria-label="Gallery pagination">';
            
            // Previous
            if (pag.has_prev) {
                html += `<a href="/gallery?page=${pag.prev_page}${tagParam}" class="pagination-link ajax-link" aria-label="Previous page">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>`;
            } else {
                html += `<span class="pagination-link disabled">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </span>`;
            }

            // Pages
            for (let p = 1; p <= pag.total_pages; p++) {
                if (p === pag.page) {
                    html += `<span class="pagination-link active">${p}</span>`;
                } else if (p === 1 || p === pag.total_pages || (p >= pag.page - 1 && p <= pag.page + 1)) {
                    html += `<a href="/gallery?page=${p}${tagParam}" class="pagination-link ajax-link">${p}</a>`;
                } else if (p === pag.page - 2 || p === pag.page + 2) {
                    html += `<span class="pagination-ellipsis">&hellip;</span>`;
                }
            }

            // Next
            if (pag.has_next) {
                html += `<a href="/gallery?page=${pag.next_page}${tagParam}" class="pagination-link ajax-link" aria-label="Next page">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </a>`;
            } else {
                html += `<span class="pagination-link disabled">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </span>`;
            }
            
            html += '</nav>';
        }

        galleryContent.innerHTML = html;
    }

    // Update active state on filter buttons
    function updateActiveFilter(url) {
        if (!filtersContainer) return;
        
        const urlObj = new URL(url, window.location.origin);
        const tag = urlObj.searchParams.get('tag');
        
        const buttons = filtersContainer.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            const btnUrl = new URL(btn.href, window.location.origin);
            const btnTag = btnUrl.searchParams.get('tag');
            
            if (tag === btnTag) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // Attach click listeners to ajax links
    function attachListeners() {
        const links = document.querySelectorAll('.ajax-link');
        links.forEach(link => {
            // Remove old listener to avoid duplicates if any (simple approach)
            link.removeEventListener('click', handleLinkClick);
            link.addEventListener('click', handleLinkClick);
        });
    }

    function handleLinkClick(e) {
        e.preventDefault();
        const url = this.getAttribute('href');
        loadGalleryContent(url);
    }

    // Initial attachment
    attachListeners();

    // Handle back/forward browser buttons
    window.addEventListener('popstate', function() {
        loadGalleryContent(window.location.href);
    });
});
</script>
{% endblock %}
