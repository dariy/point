{% extends "light/base.html" %}

{% block page_title %}Security Settings{% endblock %}

{% block content %}
<div class="settings-container">
    <form id="password-form" class="light-form">
        <div class="form-section">
            <h3 class="section-title">Change Password</h3>
            <p style="margin-bottom: 20px; color: var(--light-text-secondary); font-size: 0.9em;">Update your account password. You will need to provide your current password for verification.</p>
            
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_name" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_name" required minlength="8">
                    <p class="form-help">Min. 8 characters</p>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_name" required minlength="8">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <span id="password-status" class="save-status"></span>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/auth.js"></script>
<style>
.settings-container {
    max-width: 800px;
    margin: 0 auto;
}
.form-section {
    background: var(--light-card-bg);
    border: 1px solid var(--light-border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
}
.section-title {
    margin-top: 0;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--light-border);
    color: var(--light-text-primary);
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--light-text-primary);
}
.form-group input[type="password"] {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--light-border);
    border-radius: 4px;
    background: var(--light-input-bg);
    color: var(--light-text-primary);
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.form-help {
    margin: 5px 0 0;
    font-size: 0.85em;
    color: var(--light-text-secondary);
}
.form-actions {
    display: flex;
    align-items: center;
    gap: 20px;
}
.save-status {
    font-weight: 500;
}
.save-status.success {
    color: #10b981;
}
.save-status.error {
    color: #ef4444;
}
</style>
{% endblock %}
