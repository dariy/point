# Production Docker Compose Configuration
# This file provides production-specific settings and optional nginx reverse proxy

services:
  point:
    image: ghcr.io/dariy/point:${IMAGE_TAG:-latest}
    container_name: point-prod
    restart: unless-stopped

    ports:
      - "${APP_PORT:-8000}:8000"

    env_file:
      - .env

    environment:
      # Production environment
      - APP_ENV=production
      - TZ=UTC

      # Security settings
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_SECRET=${SESSION_SECRET}

      # Database
      - DATABASE_URL=sqlite+aiosqlite:////data/point.db
      - STORAGE_PATH=/data

      # Blog settings
      - BLOG_TITLE=${BLOG_TITLE:-My Photo Blog}
      - BLOG_DESCRIPTION=${BLOG_DESCRIPTION:-A personal photography journal}
      - BLOG_AUTHOR=${BLOG_AUTHOR:-Photographer}
      - BLOG_URL=${BLOG_URL:-https://yourdomain.com}

      # Media settings
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-52428800}
      - STORAGE_QUOTA=${STORAGE_QUOTA:-10737418240}

      # Performance
      - CACHE_ENABLED=true
      - CACHE_TTL=${CACHE_TTL:-3600}

      # Backup settings
      - BACKUP_ENABLED=true
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Use named volume for data persistence
      - point-data:/data

    networks:
      - point-network

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.95'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only root filesystem (except /data and /tmp)
    # Uncomment for additional security
    # read_only: true
    tmpfs:
      - /tmp:size=100M,mode=1777

volumes:
  point-data:
    name: point-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-../data}

networks:
  point-network:
    driver: bridge
