{% extends "public/base.html" %}

{% block page_title %}Tags{% endblock %}

{% block extra_css %}
{{ super() }}
<meta property="og:title" content="Tags">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta name="description" content="Browse posts by tags">
{% endblock %}

{% block content %}
<div class="tags-page">
    <!--header class="page-header">
        <h1 class="page-title">Tags</h1>
        <p class="page-description">Browse all photos</p>
    </header-->

    {% if tags %}
    <div class="tags-filters" id="tags-filters">
        <a href="/tags" class="filter-btn ajax-link {% if not current_tag %}active{% endif %}">All</a>
        {% for tag in tags %}
        <a href="/tags/{{ tag.slug }}" class="filter-btn ajax-link {% if current_tag == tag.slug %}active{% endif %}">
            {{ tag.name }}
        </a>
        {% endfor %}
    </div>
    {% endif %}

    <div id="tags-content">
        {% include "public/partials/tags_grid.html" %}
    </div>
</div>
{% endblock %}
