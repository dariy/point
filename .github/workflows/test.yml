name: Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run --timeout=5m
        working-directory: api

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: api/go.sum

      - name: Build CSS bundles
        run: chmod +x scripts/build-css.sh && ./scripts/build-css.sh

      - name: Run Go tests
        run: |
          cd api
          go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          file: api/coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unittests
          name: codecov-go

  docker-smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          push: false
          load: true
          tags: point:smoke

      - name: Start container and verify /health
        run: |
          mkdir -p /tmp/point-smoke && chmod 777 /tmp/point-smoke
          docker run -d --name point-smoke -p 8000:8000 \
            -e DATABASE_URL=/data/point.db \
            -e STORAGE_PATH=/data \
            -v /tmp/point-smoke:/data \
            point:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || (docker logs point-smoke && exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f point-smoke || true
