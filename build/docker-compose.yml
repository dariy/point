services:
  point:
    build:
      context: ..
      dockerfile: build/Dockerfile
    image: ghcr.io/dariy/point:main
    container_name: point
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - point-data:/data
    env_file:
      - .env
    environment:
      - TZ=UTC
      - DATABASE_URL=/data/point.db
      - STORAGE_PATH=/data
      - PORT=8000
      - HOST=0.0.0.0
    networks:
      - point-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  point-data:
    driver: local

networks:
  default:
    name: point-network
    external: true
  point-network:
    driver: bridge
