name: Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: api/go.sum

      - name: Install golangci-lint
        # Pinned for reproducible CI; note the /v2 module path — the bare path
        # installs the abandoned v1 line. Keep in sync with local tooling.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: golangci-lint
        run: golangci-lint run --timeout=5m
        working-directory: api

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      # Prefer the lockfile-pinned eslint when the repo ships one (flat
      # config); until then, pin the last legacy-config release to match the
      # local gate (scripts/check.sh runs `eslint frontend/src`).
      - name: JS lint
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
            node_modules/.bin/eslint frontend/src
          else
            ESLINT_USE_FLAT_CONFIG=false npx --yes eslint@8.57.1 frontend/src
          fi

      - name: JS tests
        run: node --test frontend/test/*.test.js

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Deliberately the newest patch release: govulncheck resolves Go
          # stdlib symbols from the toolchain in use, so an older patch level
          # here would re-flag stdlib vulns already fixed upstream.
          go-version: "1.26.5"
          cache-dependency-path: api/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
        working-directory: api

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: api/go.sum

      - name: Build CSS bundles
        run: chmod +x scripts/build-css.sh && ./scripts/build-css.sh

      - name: Run Go tests
        # -tags=integration matches scripts/check.sh — the integration suite
        # runs on in-memory sqlite and needs no external services.
        run: |
          cd api
          go test -tags=integration ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          file: api/coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unittests
          name: codecov-go

  docker-smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: false
          load: true
          tags: point:smoke

      - name: Start container and verify /health
        run: |
          mkdir -p /tmp/point-smoke && chmod 777 /tmp/point-smoke
          docker run -d --name point-smoke -p 8000:8000 \
            -e DATABASE_URL=/data/point.db \
            -e STORAGE_PATH=/data \
            -e TELEGRAM_TOKEN="${TELEGRAM_TOKEN:-}" \
            -e NOTIFY_TELEGRAM_CHAN="${NOTIFY_TELEGRAM_CHAN:-}" \
            -e NOTIFY_ADMINS="${NOTIFY_ADMINS:-}" \
            -v /tmp/point-smoke:/data \
            point:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || (docker logs point-smoke && exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f point-smoke || true
