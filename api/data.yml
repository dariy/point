prompt: |
  Generate a JSON object with a fields 'title' and 'tags' describing this image.
  Example: `{"title": "Example Title", "tags": ["tag1", "tag2", "tag3"], 'excerpt': "This is an example excerpt."}`.

  `title` contains 1-3 words that describe the image in a fun unique way.
  `tags` contains 3-5 tags, one word each, lowercase.
  `excerpt` contains a short description of the image and title in a fun unique way. One paragraph with 120 characters max.

