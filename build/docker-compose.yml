services:
  point:
    build:
      context: ..
      dockerfile: build/Dockerfile
    image: point:dev
    container_name: point
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data:z,U
    env_file:
      - .env
    environment:
      - TZ=UTC
      - DATABASE_URL=/data/point.db
      - STORAGE_PATH=/data
      - FRONTEND_DIR=/app/frontend
      - PORT=8000
      - HOST=0.0.0.0
      # remark42 comments sidecar — set REMARK_URL/REMARK_SECRET in .env to enable
      - REMARK_URL=${REMARK_URL:-}
      - REMARK_SECRET=${REMARK_SECRET:-}
      - AUTH_ANON=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
